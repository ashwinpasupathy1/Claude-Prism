name: Build macOS DMG

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build React SPA
        working-directory: plotter_web
        run: |
          npm install
          npm run build

      - name: Build .app and .dmg
        run: |
          brew install create-dmg
          ./build_app.sh --clean --dmg

      - name: Get version string
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Refraction ${{ steps.version.outputs.tag }}
          body: |
            Automated build from commit ${{ github.sha }}.

            **Install:** Download `Refraction.dmg`, open it, and drag Refraction to Applications.
          files: dist/Refraction.dmg
          draft: false
          prerelease: false
